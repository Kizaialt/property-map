<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Watermark Tool</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }
    p {
      color: #cbd5e1;
      line-height: 1.5;
    }
    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    .panel {
      background: #1f2937;
      border-radius: 16px;
      padding: 18px;
    }
    input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 1px dashed #4b5563;
      border-radius: 12px;
      background: #111827;
      color: #f9fafb;
      margin-top: 10px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
    }
    .primary {
      background: #22c55e;
      color: #052e16;
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .danger {
      background: #7f1d1d;
      color: #fecaca;
    }
    .canvas-box {
      min-height: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      background: #0f172a;
      border-radius: 16px;
      padding: 14px;
    }
    canvas {
      max-width: 100%;
      max-height: 75vh;
      border-radius: 10px;
      background: #0b1220;
    }
    .thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
    .thumb {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 8px;
      cursor: pointer;
    }
    .thumb.active {
      outline: 2px solid #22c55e;
    }
    .thumb img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
      display: block;
      margin-bottom: 6px;
    }
    .thumb small {
      color: #cbd5e1;
      word-break: break-word;
    }
    code {
      background: #111827;
      padding: 2px 6px;
      border-radius: 6px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Simple Watermark Tool</h1>
    <p>
      Upload your photos, and this page will place <code>watermark.png</code> on top of every image automatically.
      Put both <code>index.html</code> and <code>watermark.png</code> in the same GitHub Pages folder.
    </p>

    <div class="grid">
      <div class="panel">
        <h3>Upload photos</h3>
        <input id="photoInput" type="file" accept="image/*" multiple />

        <button class="secondary" id="downloadCurrentBtn" disabled>Download current image</button>
        <button class="primary" id="downloadAllBtn" disabled>Download all images</button>
        <button class="danger" id="clearBtn">Clear all</button>

        <p>
          The watermark file is loaded automatically from <code>watermark.png</code>. Make sure it has transparency.
        </p>
      </div>

      <div class="panel">
        <div class="canvas-box">
          <canvas id="canvas"></canvas>
        </div>
        <div id="thumbs" class="thumbs"></div>
      </div>
    </div>
  </div>

  <script>
    const photoInput = document.getElementById('photoInput');
    const downloadCurrentBtn = document.getElementById('downloadCurrentBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const clearBtn = document.getElementById('clearBtn');
    const thumbs = document.getElementById('thumbs');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let photos = [];
    let currentIndex = 0;
    let watermarkImage = null;

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    async function loadWatermark() {
      try {
        watermarkImage = await loadImage('watermark.png');
      } catch (err) {
        alert('Could not load watermark.png. Put watermark.png in the same folder as index.html');
      }
    }

    async function handlePhotos(files) {
      photos = [];
      for (const file of files) {
        const dataUrl = await readFileAsDataURL(file);
        const img = await loadImage(dataUrl);
        photos.push({ file, dataUrl, img, name: file.name });
      }
      currentIndex = 0;
      renderThumbs();
      await renderCurrent();
      updateButtons();
    }

    function renderThumbs() {
      thumbs.innerHTML = '';
      photos.forEach((photo, index) => {
        const card = document.createElement('div');
        card.className = 'thumb' + (index === currentIndex ? ' active' : '');
        card.innerHTML = `
          <img src="${photo.dataUrl}" alt="${photo.name}">
          <small>${photo.name}</small>
        `;
        card.addEventListener('click', async () => {
          currentIndex = index;
          renderThumbs();
          await renderCurrent();
        });
        thumbs.appendChild(card);
      });
    }

    async function renderCurrent() {
      if (!photos.length) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
      }
      const baseImg = photos[currentIndex].img;
      canvas.width = baseImg.naturalWidth || baseImg.width;
      canvas.height = baseImg.naturalHeight || baseImg.height;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(baseImg, 0, 0, canvas.width, canvas.height);

      if (watermarkImage) {
        ctx.drawImage(watermarkImage, 0, 0, canvas.width, canvas.height);
      }
    }

    function downloadCanvas(filename) {
      const link = document.createElement('a');
      link.href = canvas.toDataURL('image/jpeg', 0.95);
      link.download = filename.replace(/\.[^/.]+$/, '') + '-watermarked.jpg';
      link.click();
    }

    async function renderOffscreen(photo) {
      const off = document.createElement('canvas');
      const offCtx = off.getContext('2d');
      off.width = photo.img.naturalWidth || photo.img.width;
      off.height = photo.img.naturalHeight || photo.img.height;

      offCtx.drawImage(photo.img, 0, 0, off.width, off.height);
      if (watermarkImage) {
        offCtx.drawImage(watermarkImage, 0, 0, off.width, off.height);
      }
      return off;
    }

    async function downloadAll() {
      for (const photo of photos) {
        const off = await renderOffscreen(photo);
        const link = document.createElement('a');
        link.href = off.toDataURL('image/jpeg', 0.95);
        link.download = photo.name.replace(/\.[^/.]+$/, '') + '-watermarked.jpg';
        link.click();
        await new Promise(resolve => setTimeout(resolve, 250));
      }
    }

    function updateButtons() {
      const hasPhotos = photos.length > 0;
      downloadCurrentBtn.disabled = !hasPhotos;
      downloadAllBtn.disabled = !hasPhotos;
    }

    photoInput.addEventListener('change', async (e) => {
      await handlePhotos([...e.target.files]);
    });

    downloadCurrentBtn.addEventListener('click', () => {
      if (!photos.length) return;
      downloadCanvas(photos[currentIndex].name);
    });

    downloadAllBtn.addEventListener('click', downloadAll);

    clearBtn.addEventListener('click', () => {
      photos = [];
      currentIndex = 0;
      photoInput.value = '';
      thumbs.innerHTML = '';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      canvas.width = 300;
      canvas.height = 150;
      updateButtons();
    });

    canvas.width = 300;
    canvas.height = 150;
    loadWatermark();
    updateButtons();
  </script>
</body>
</html>
