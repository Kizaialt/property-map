<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listing Generator Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
}

.container {
    max-width: 650px;
    margin: auto;
    padding: 15px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.badge {
    background: red;
    padding: 8px 14px;
    border-radius: 10px;
    font-weight: bold;
}

.title {
    font-size: 40px;
    font-weight: 900;
}

.date {
    font-size: 14px;
    text-align: right;
    opacity: 0.8;
}

.card {
    margin-top: 15px;
    background: #1c1c1c;
    border-radius: 20px;
    overflow: hidden;
}

.main-img {
    width: 100%;
    height: 320px;
    object-fit: cover;
}

.info {
    display: flex;
    justify-content: space-around;
    padding: 12px;
    font-weight: bold;
    font-size: 14px;
}

.price-bar {
    background: red;
    padding: 14px;
    font-size: 20px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
}

.gallery {
    display: flex;
    gap: 8px;
    padding: 10px;
}

.gallery img {
    width: 100%;
    height: 95px;
    object-fit: cover;
    border-radius: 10px;
}

.footer {
    text-align: center;
    padding: 12px;
    font-size: 11px;
    letter-spacing: 2px;
    opacity: 0.7;
}

/* Inputs */
.panel {
    margin-top: 20px;
    background: #1a1a1a;
    padding: 10px;
    border-radius: 10px;
}

input {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    border-radius: 6px;
    border: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: red;
    border: none;
    color: white;
    font-weight: bold;
    border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">

    <!-- EXPORT AREA -->
    <div id="capture">

        <div class="header">
            <div class="badge">% BELOW MARKET VALUE</div>
            <div>
                <div class="title">ОНЦЛОХ</div>
                <div class="date" id="date"></div>
            </div>
        </div>

        <div class="card">
            <img id="mainImg" class="main-img" src="https://via.placeholder.com/600x300">

            <div class="info">
                <div id="outLocation">БЗД</div>
                <div id="outKhoroo">26-р хороо</div>
                <div id="outSize">105м2</div>
                <div id="outExtra">4 өрөө</div>
            </div>

            <div class="price-bar">
                <div id="outName">ОЛИМП хотхон</div>
                <div id="outPrice">423 сая</div>
            </div>

            <div class="gallery">
                <img id="img1" src="https://via.placeholder.com/150">
                <img id="img2" src="https://via.placeholder.com/150">
                <img id="img3" src="https://via.placeholder.com/150">
            </div>
        </div>

        <div class="footer">МОНГОЛЫН ХУДАЛДААНЫ ТӨВ ЦЭГ</div>

    </div>

    <!-- CONTROL PANEL -->
    <div class="panel">
        <input id="location" placeholder="БЗД / ХУД">
        <input id="khoroo" placeholder="24-р хороо">
        <input id="size" placeholder="123 м2">
        <input id="extra" placeholder="4 өрөө / үйлчилгээ">
        <input id="name" placeholder="Хотхоны нэр">
        <input id="price" placeholder="Үнэ">

        <input type="file" onchange="loadImage(event, 'mainImg')">
        <input type="file" onchange="loadImage(event, 'img1')">
        <input type="file" onchange="loadImage(event, 'img2')">
        <input type="file" onchange="loadImage(event, 'img3')">

        <button onclick="exportImage()">EXPORT AS IMAGE</button>
    </div>

</div>

<script>

// Auto date
document.getElementById("date").innerText =
    new Date().toISOString().slice(0,10).replace(/-/g,".");

// Live update
document.querySelectorAll("input").forEach(input => {
    input.addEventListener("input", () => {
        outLocation.innerText = location.value;
        outKhoroo.innerText = khoroo.value;
        outSize.innerText = size.value;
        outExtra.innerText = extra.value;
        outName.innerText = name.value;
        outPrice.innerText = price.value;
    });
});

// Image upload
function loadImage(event, id) {
    const reader = new FileReader();
    reader.onload = function(){
        document.getElementById(id).src = reader.result;
    }
    reader.readAsDataURL(event.target.files[0]);
}

// Export image
function exportImage() {
    html2canvas(document.getElementById("capture")).then(canvas => {
        const link = document.createElement("a");
        link.download = "listing.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

</script>

</body>
</html>
